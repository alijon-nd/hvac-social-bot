name: Post HVAC Content

on:
  schedule:
    - cron: '0 12 * * 1,3,5'  # Mon, Wed, Fri at 12:00 PM UTC
  workflow_dispatch:          # Manual trigger from GitHub UI

jobs:
  post:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create Google Cloud credentials file
        run: echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}' > service-account-key.json
      
      - name: Run HVAC Social Bot
        env:
          # Google Cloud Storage
          GCS_BUCKET_NAME: ${{ secrets.GCS_BUCKET_NAME }}
          GCS_FOLDER_PATH: ${{ secrets.GCS_FOLDER_PATH }}
          GOOGLE_APPLICATION_CREDENTIALS: service-account-key.json
          
          # DeepSeek API
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          
          # Meta (Facebook/Instagram) - add later
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          
          # Dry run mode (true = test only, false = actually post)
          DRY_RUN: true
          
        run: python main.py
      
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: |
            *.log
            *.json
